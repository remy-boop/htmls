<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wavelength — Longitudinal RAG Music Recommendation System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111210;
    color: #c2c0b6;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    min-height: 100vh;
    padding: 40px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .container {
    width: 100%;
    max-width: 760px;
  }

  h1 {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #5f5e5a;
    text-align: center;
    margin-bottom: 32px;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* SVG color classes — dark mode */
  .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #2c2c2a; stroke: #444441; }
  .c-gray .th { fill: #d3d1c7; }
  .c-gray .ts { fill: #888780; }

  .c-teal rect, .c-teal circle { fill: #04342c; stroke: #0f6e56; }
  .c-teal .th { fill: #9fe1cb; }
  .c-teal .ts { fill: #5dcaa5; }

  .c-purple rect, .c-purple circle { fill: #26215c; stroke: #534ab7; }
  .c-purple .th { fill: #cecbf6; }
  .c-purple .ts { fill: #afa9ec; }

  .c-coral rect, .c-coral circle { fill: #4a1b0c; stroke: #993c1d; }
  .c-coral .th { fill: #f5c4b3; }
  .c-coral .ts { fill: #f0997b; }

  .c-green rect, .c-green circle { fill: #173404; stroke: #3b6d11; }
  .c-green .th { fill: #c0dd97; }
  .c-green .ts { fill: #97c459; }

  .c-amber rect, .c-amber circle { fill: #412402; stroke: #854f0b; }
  .c-amber .th { fill: #fac775; }
  .c-amber .ts { fill: #ef9f27; }

  /* text base classes */
  .th {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    fill: #d3d1c7;
  }
  .ts {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 400;
    fill: #888780;
  }

  /* neutral rects (step labels, banners, dashed boxes) */
  .bg-secondary { fill: #1a1a18; }
  .border-secondary { stroke: #3a3a38; }
  .border-tertiary { stroke: #2a2a28; }
  .text-primary { fill: #c2c0b6; }
  .text-secondary { fill: #888780; }
  .text-info { fill: #5dcaa5; }

  footer {
    margin-top: 48px;
    font-size: 11px;
    color: #444441;
    text-align: center;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Wavelength · Longitudinal RAG Music Recommendation System</h1>

<svg viewBox="0 0 680 1760" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- ONE-LINER -->
<rect x="30" y="18" width="620" height="62" rx="8" fill="none" stroke="#3a3a38" stroke-width="1" stroke-dasharray="5 4"/>
<text class="th text-primary" x="340" y="40" text-anchor="middle" dominant-baseline="central">"Spotify knows what your demographic likes.</text>
<text class="th text-primary" x="340" y="62" text-anchor="middle" dominant-baseline="central">Wavelength knows what you like — and proves it, every week."</text>

<!-- CYCLE BANNER -->
<rect x="30" y="92" width="620" height="28" rx="6" fill="#1a1a18"/>
<text class="ts text-secondary" x="340" y="106" text-anchor="middle" dominant-baseline="central">↻  An endless cycle — runs every week, for life, as long as you listen</text>

<!-- STEP LABEL 1 -->
<text class="ts text-secondary" x="310" y="136" text-anchor="middle" dominant-baseline="central">Step 1 — capture your behavior</text>

<!-- STEP 1 -->
<g class="c-gray">
<rect x="50" y="148" width="530" height="76" rx="8" stroke-width="0.5"/>
<text class="th" x="315" y="170" text-anchor="middle" dominant-baseline="central">You listen to music</text>
<text class="ts" x="315" y="190" text-anchor="middle" dominant-baseline="central">25 event types: plays · skips · replays · likes · downloads · seek position · time of day · device</text>
<text class="ts" x="315" y="208" text-anchor="middle" dominant-baseline="central">Not just what you played — when, how far, how many times, and on what device</text>
</g>

<!-- FEEDBACK LOOP -->
<path d="M 598 172 L 638 172 L 638 556 L 598 556" fill="none" stroke="#3a3a38" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text class="ts text-secondary" x="651" y="364" text-anchor="middle" dominant-baseline="central" transform="rotate(90 651 364)">plays · skips · replays this week update next week's model</text>

<!-- arrow 1→2 -->
<line x1="315" y1="224" x2="315" y2="242" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STEP LABEL 2 -->
<text class="ts text-secondary" x="310" y="256" text-anchor="middle" dominant-baseline="central">Step 2 — extract signals (RAG input data)</text>

<!-- STEP 2 -->
<g class="c-teal">
<rect x="50" y="268" width="530" height="76" rx="8" stroke-width="0.5"/>
<text class="th" x="315" y="290" text-anchor="middle" dominant-baseline="central">Claude reads raw events and extracts behavioral patterns</text>
<text class="ts" x="315" y="310" text-anchor="middle" dominant-baseline="central">"Skips within 10 seconds if no tension" — "Replayed same track 10 times"</text>
<text class="ts" x="315" y="328" text-anchor="middle" dominant-baseline="central">Surfaces patterns the user themselves cannot articulate</text>
</g>

<!-- arrow 2→3 -->
<line x1="315" y1="344" x2="315" y2="362" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STEP LABEL 3 -->
<text class="ts text-secondary" x="310" y="376" text-anchor="middle" dominant-baseline="central">Step 3 — update the memory (longitudinal layer)</text>

<!-- STEP 3 -->
<g class="c-purple">
<rect x="50" y="388" width="530" height="104" rx="8" stroke-width="0.5"/>
<text class="th" x="315" y="410" text-anchor="middle" dominant-baseline="central">The hypothesis table — your taste model, never resets</text>
<text class="ts" x="315" y="432" text-anchor="middle" dominant-baseline="central">Early on → hypotheses created and tested against new behavior each week</text>
<text class="ts" x="315" y="450" text-anchor="middle" dominant-baseline="central">Once a pattern holds across multiple weeks → confirmed, model bets on it</text>
<text class="ts" x="315" y="468" text-anchor="middle" dominant-baseline="central">After enough confirmed theories → measurable whether the model is working</text>
<text class="ts" x="315" y="486" text-anchor="middle" dominant-baseline="central">If taste shifts → old hypotheses disconfirmed, new ones created automatically</text>
</g>

<!-- week 8 note -->
<rect x="50" y="500" width="530" height="54" rx="5" fill="none" stroke="#3a3a38" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="ts text-secondary" x="315" y="518" text-anchor="middle" dominant-baseline="central">By week 8 the model has gone through enough cycles to be fully validated:</text>
<text class="ts text-secondary" x="315" y="534" text-anchor="middle" dominant-baseline="central">hypotheses created (weeks 1–2), tested across varied contexts (weeks 3–5),</text>
<text class="ts text-secondary" x="315" y="550" text-anchor="middle" dominant-baseline="central">and confirmed or rejected with enough data to trust the result (weeks 6–8).</text>

<!-- arrow 3→4 -->
<line x1="315" y1="554" x2="315" y2="572" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STEP LABEL 4 -->
<text class="ts text-secondary" x="310" y="586" text-anchor="middle" dominant-baseline="central">Step 4 — retrieve and inject (the RAG step)</text>

<!-- STEP 4 -->
<g class="c-coral">
<rect x="50" y="598" width="530" height="88" rx="8" stroke-width="0.5"/>
<text class="th" x="315" y="620" text-anchor="middle" dominant-baseline="central">Your signals + confirmed hypotheses retrieved from database</text>
<text class="ts" x="315" y="640" text-anchor="middle" dominant-baseline="central">Injected into Claude before every generation — this is what makes it personal</text>
<text class="ts" x="315" y="658" text-anchor="middle" dominant-baseline="central">Early prompts have thin context. Later prompts carry weeks of confirmed theories.</text>
<text class="ts" x="315" y="676" text-anchor="middle" dominant-baseline="central">Same AI model — dramatically richer input each week — that is why results improve</text>
</g>

<!-- arrow 4→5 -->
<line x1="315" y1="686" x2="315" y2="704" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arrow)"/>

<!-- STEP LABEL 5 -->
<text class="ts text-secondary" x="310" y="718" text-anchor="middle" dominant-baseline="central">Step 5+6 — generate, verify, sequence</text>

<!-- STEP 5 -->
<g class="c-green">
<rect x="50" y="730" width="530" height="58" rx="8" stroke-width="0.5"/>
<text class="th" x="315" y="752" text-anchor="middle" dominant-baseline="central">15 candidates → MusicBrainz verified → 10 sequenced as emotional arc</text>
<text class="ts" x="315" y="770" text-anchor="middle" dominant-baseline="central">Two Claude calls · hallucination guard · ISO sequencing principle · DJ logic</text>
</g>

<!-- DIVIDER -->
<line x1="40" y1="818" x2="640" y2="818" stroke="#2a2a28" stroke-width="1"/>

<!-- BUSINESS SECTION -->
<text class="th text-primary" x="340" y="844" text-anchor="middle" dominant-baseline="central">The business hypothesis</text>
<text class="ts text-secondary" x="340" y="864" text-anchor="middle" dominant-baseline="central">Does longitudinal RAG outperform cluster recommendations —</text>
<text class="ts text-secondary" x="340" y="880" text-anchor="middle" dominant-baseline="central">and does the engagement delta justify the infrastructure cost?</text>

<!-- TWO BOXES -->
<g class="c-gray">
<rect x="40" y="898" width="272" height="114" rx="8" stroke-width="0.5"/>
<text class="th" x="176" y="920" text-anchor="middle" dominant-baseline="central">Cluster model (today)</text>
<text class="ts" x="176" y="942" text-anchor="middle" dominant-baseline="central">Optimizes for your cluster average.</text>
<text class="ts" x="176" y="958" text-anchor="middle" dominant-baseline="central">Collaborative filtering regresses</text>
<text class="ts" x="176" y="974" text-anchor="middle" dominant-baseline="central">to the mean — popular tracks win.</text>
<text class="ts" x="176" y="990" text-anchor="middle" dominant-baseline="central">Every user in your segment gets</text>
<text class="ts" x="176" y="1006" text-anchor="middle" dominant-baseline="central">roughly the same recommendations.</text>
</g>

<!-- VS badge -->
<circle cx="340" cy="955" r="18" fill="#1a1a18" stroke="#3a3a38" stroke-width="1"/>
<text class="th text-secondary" x="340" y="955" text-anchor="middle" dominant-baseline="central">vs</text>

<g class="c-teal">
<rect x="368" y="898" width="272" height="114" rx="8" stroke-width="0.5"/>
<text class="th" x="504" y="920" text-anchor="middle" dominant-baseline="central">Longitudinal model (this)</text>
<text class="ts" x="504" y="942" text-anchor="middle" dominant-baseline="central">Optimizes for you specifically.</text>
<text class="ts" x="504" y="958" text-anchor="middle" dominant-baseline="central">Behavioral contrast, not cluster avg.</text>
<text class="ts" x="504" y="974" text-anchor="middle" dominant-baseline="central">Accumulates memory — week N+1</text>
<text class="ts" x="504" y="990" text-anchor="middle" dominant-baseline="central">is always smarter than week N.</text>
<text class="ts" x="504" y="1006" text-anchor="middle" dominant-baseline="central">No other platform does this today.</text>
</g>

<!-- EVIDENCE — against cluster -->
<rect x="40" y="1028" width="600" height="76" rx="6" fill="#1a1a18" stroke="#2a2a28" stroke-width="0.5"/>
<text class="th text-primary" x="60" y="1048" dominant-baseline="central">Against cluster — documented</text>
<text class="ts text-secondary" x="60" y="1068" dominant-baseline="central">A randomized field experiment on Spotify found behavioral recs outperform demographic-group</text>
<text class="ts text-secondary" x="60" y="1084" dominant-baseline="central">recs by 28.9% in streams — same users, same content, different targeting logic.</text>
<text class="ts text-info" x="60" y="1098" dominant-baseline="central">arxiv.org/abs/2003.08203  ·  Holtz et al., MIT IDE / Spotify, 2020</text>

<!-- EVIDENCE — for longitudinal -->
<rect x="40" y="1116" width="600" height="90" rx="6" fill="#1a1a18" stroke="#2a2a28" stroke-width="0.5"/>
<text class="th text-primary" x="60" y="1136" dominant-baseline="central">For longitudinal — proxy from Netflix</text>
<text class="ts text-secondary" x="60" y="1156" dominant-baseline="central">Netflix's own 2025 research shows replacing their behavioral RecSys with a popularity-based</text>
<text class="ts text-secondary" x="60" y="1172" dominant-baseline="central">model — the cluster equivalent — costs 12% in engagement. They explicitly optimize for</text>
<text class="ts text-secondary" x="60" y="1188" dominant-baseline="central">long-term satisfaction across sessions, not short-term clicks. Different industry, same mechanism.</text>
<text class="ts text-info" x="60" y="1204" dominant-baseline="central">arxiv.org/abs/2511.07280  ·  Zielnicki et al., Netflix, 2025</text>

<!-- compound intro -->
<text class="ts text-secondary" x="340" y="1236" text-anchor="middle" dominant-baseline="central">If the engagement delta is real, it compounds across three levers</text>

<!-- THREE OUTCOME BOXES -->
<g class="c-amber">
<rect x="66" y="1250" width="160" height="118" rx="8" stroke-width="0.5"/>
<text class="th" x="146" y="1272" text-anchor="middle" dominant-baseline="central">Session depth</text>
<text class="ts" x="146" y="1292" text-anchor="middle" dominant-baseline="central">Relevant tracks</text>
<text class="ts" x="146" y="1308" text-anchor="middle" dominant-baseline="central">extend sessions.</text>
<text class="ts" x="146" y="1324" text-anchor="middle" dominant-baseline="central">Longer sessions =</text>
<text class="ts" x="146" y="1340" text-anchor="middle" dominant-baseline="central">more ad inventory</text>
<text class="ts" x="146" y="1356" text-anchor="middle" dominant-baseline="central">and lower churn.</text>
</g>
<g class="c-amber">
<rect x="260" y="1250" width="160" height="118" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="1272" text-anchor="middle" dominant-baseline="central">Ad yield</text>
<text class="ts" x="340" y="1292" text-anchor="middle" dominant-baseline="central">Engaged listeners</text>
<text class="ts" x="340" y="1308" text-anchor="middle" dominant-baseline="central">command higher</text>
<text class="ts" x="340" y="1324" text-anchor="middle" dominant-baseline="central">CPM. Completion</text>
<text class="ts" x="340" y="1340" text-anchor="middle" dominant-baseline="central">rate is a signal</text>
<text class="ts" x="340" y="1356" text-anchor="middle" dominant-baseline="central">advertisers pay for.</text>
</g>
<g class="c-coral">
<rect x="454" y="1250" width="160" height="118" rx="8" stroke-width="0.5"/>
<text class="th" x="534" y="1272" text-anchor="middle" dominant-baseline="central">Conversion</text>
<text class="ts" x="534" y="1292" text-anchor="middle" dominant-baseline="central">Model detects peak</text>
<text class="ts" x="534" y="1308" text-anchor="middle" dominant-baseline="central">engagement moments.</text>
<text class="ts" x="534" y="1324" text-anchor="middle" dominant-baseline="central">Upsell triggered by</text>
<text class="ts" x="534" y="1340" text-anchor="middle" dominant-baseline="central">behavioral signal,</text>
<text class="ts" x="534" y="1356" text-anchor="middle" dominant-baseline="central">not a hard cap.</text>
</g>

</svg>

<footer>Wavelength · remy-boop · April 2026</footer>
</div>
</body>
</html>
